<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        @page { 
            size: letter; 
            margin: 0.5cm 0.4cm; 
        }
        body { 
            font-family: "Helvetica", "Arial", sans-serif; 
            font-size: 5pt; 
            line-height: 1.0;
            margin: 0;
            padding: 0;
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
        }
        td, th { 
            border: 0.5pt solid #000; 
            padding: 0.5pt 1pt; 
            vertical-align: middle;
        }
        th {
            font-size: 3.5pt;
            font-weight: bold;
        }
        .nb { border: none !important; }
        .b { font-weight: bold; }
        .c { text-align: center; }
        .r { text-align: right; }
        .bg { background-color: #e8e8e8; }
        .lbl { font-size: 3pt; color: #555; display: block; text-transform: uppercase; line-height: 1.0; margin-bottom: 0pt; }
        .v { font-size: 5.5pt; font-weight: bold; display: block; line-height: 1.1; }
        .cut { border-top: 0.5pt dashed #000; margin-top: 5pt; padding-top: 3pt; }
        .gc { 
            font-size: 4.5pt; 
            text-align: center; 
            padding: 2.5pt 0pt !important;
            overflow: hidden;
        }
        .mc {
            font-size: 4.5pt;
            padding: 2.5pt 1pt !important;
            white-space: nowrap;
            overflow: hidden;
        }
        .sh {
            font-size: 2.5pt;
            padding: 1pt 0pt !important;
            text-align: center;
            overflow: hidden;
        }
        .page-break {
            padding: 0;
            margin: 0;
            page-break-after: always;
        }
    </style>
</head>
<body>
    {% for boleta in boletas %}
    <div class="{% if not loop.last %}page-break{% endif %}">
        {% include "_boleta_content.html" %}
    </div>
    {% endfor %}
</body>
</html>
